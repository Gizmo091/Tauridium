name: Release

# Déclenché par un tag de version (ex. v1.2.0). Enchaîne :
#   1) tests  2) création de la release draft  3) build multi-plateforme
#   4) publication de la release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 1) Gate : les tests doivent passer avant de compiler quoi que ce soit.
  test:
    name: Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Frontend unit tests
        run: npm test
      - name: Install Linux WebView deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # 2) Crée la release en brouillon UNE SEULE FOIS (évite que chaque job de la
  #    matrice en crée une -> plus de releases dupliquées / assets éparpillés).
  create-release:
    name: Create draft release
    needs: test
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v5
      - name: Create the draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Tauridium ${tag}`,
              body: `Automated build of Tauridium ${tag}.\nDownload the asset matching your platform below.`,
              draft: true,
              prerelease: false,
            });
            return data.id;

  # 3) Build natif pour chaque plateforme/architecture -> upload dans LA release.
  build:
    name: Build ${{ matrix.platform }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universel (Intel + Apple Silicon en un seul bundle).
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # Linux x86_64 (Intel/AMD).
          - platform: ubuntu-22.04
            args: ''
            targets: ''
          # Linux ARM64 (runner ARM hébergé par GitHub).
          - platform: ubuntu-24.04-arm
            args: ''
            targets: ''
          # Windows x86_64 (Intel/AMD).
          - platform: windows-latest
            args: ''
            targets: ''
          # Windows ARM64 (runner ARM hébergé par GitHub).
          - platform: windows-11-arm
            args: ''
            targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      # Le nom des bundles vient de la version de l'app (tauri.conf.json / Cargo.toml),
      # pas du tag. On la cale sur le tag pour que les artefacts soient bien nommés.
      - name: Sync app version to the tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          echo "App version -> $VERSION"
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');"
          node -e "const fs=require('fs');const p='src-tauri/Cargo.toml';let t=fs.readFileSync(p,'utf8');t=t.replace(/^version = \".*\"/m,'version = \"'+process.env.VERSION+'\"');fs.writeFileSync(p,t);"
      - name: Install Linux WebView deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # Signature + notarisation macOS : activées UNIQUEMENT si le secret
      # APPLE_CERTIFICATE est renseigné (sinon build non signé, ad-hoc). On écrit les
      # variables dans $GITHUB_ENV pour l'étape suivante ; passer des APPLE_* vides
      # ferait échouer tauri-action (security import d'un certificat vide).
      - name: Configure macOS code signing (only when secrets exist)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Signing secrets found -> macOS build will be signed & notarized."
            {
              echo "APPLE_CERTIFICATE<<__EOF__"
              echo "$APPLE_CERTIFICATE"
              echo "__EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "No signing secrets -> macOS build will be unsigned (ad-hoc)."
          fi
      - name: Build the app & upload bundles to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # 4) Tous les builds OK -> on publie la release (draft -> published).
  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Flip the draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest
